<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing</title>
<style>
  :root {
    --panel: rgba(255, 255, 255, 0.72);
    --panel-2: rgba(255, 255, 255, 0.55);
    --border: rgba(255, 255, 255, 0.85);
    --text: #0a3d52;
    --muted: #4f7e8c;
    --accent: #0077b6;
    --green: #2a9d8f;
    --orange: #e76f51;
    --grey: #8aa4b0;
    --shadow: 0 4px 16px rgba(10, 61, 82, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    /* Caribbean sky fading down to warm Keys sand */
    background: linear-gradient(180deg,
      #2ec4e6 0%,
      #57d2ec 22%,
      #9fe6f2 45%,
      #d8f3e3 68%,
      #f4e4c1 88%,
      #efd9a8 100%);
    background-attachment: fixed;
    min-height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: transparent;
    color: var(--text);
    line-height: 1.5;
    padding: 28px;
    max-width: 1200px;
    margin: 0 auto;
    min-height: 100vh;
  }

  header { margin-bottom: 24px; }
  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -.02em;
    color: #06384a;
    text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
  }
  header .date { color: #1b5468; font-size: 1rem; margin-top: 2px; font-weight: 500; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .panel {
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
    min-height: 220px;
  }

  .panel h2 {
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .loading, .error {
    color: var(--muted);
    font-size: .9rem;
    padding: 12px 0;
  }
  .error { color: #f85149; }

  /* ---- Weather ---- */
  .wx-current {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .wx-icon { font-size: 3.4rem; line-height: 1; }
  .wx-temp { font-size: 2.6rem; font-weight: 600; letter-spacing: -.02em; }
  .wx-cond { color: var(--muted); font-size: .95rem; }
  .wx-meta { color: var(--muted); font-size: .85rem; margin-top: 4px; }
  .wx-forecast {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .wx-day {
    text-align: center;
    background: var(--panel-2);
    border-radius: 8px;
    padding: 10px 4px;
  }
  .wx-day .d { font-size: .75rem; color: var(--muted); }
  .wx-day .i { font-size: 1.5rem; margin: 4px 0; }
  .wx-day .t { font-size: .82rem; }
  .wx-day .t .hi { font-weight: 600; }
  .wx-day .t .lo { color: var(--muted); }
  .wx-day .w { font-size: .68rem; color: var(--muted); margin-top: 4px; }

  /* ---- Weekend countdown ---- */
  .countdown {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 180px;
  }
  .cd-units { display: flex; gap: 10px; }
  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--panel-2);
    border-radius: 12px;
    padding: 14px 6px 10px;
    min-width: 70px;
  }
  .cd-num {
    font-size: 2.9rem;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .cd-label {
    font-size: .66rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-top: 8px;
  }
  .cd-sub { color: var(--muted); font-size: .82rem; margin-top: 16px; }
  .cd-weekend {
    font-size: 1.7rem;
    font-weight: 700;
    text-align: center;
    color: var(--accent);
    line-height: 1.35;
  }

  /* ---- GitHub commit activity ---- */
  .gh-repo { margin-bottom: 16px; }
  .gh-repo:last-child { margin-bottom: 0; }
  .gh-name {
    display: inline-block;
    font-size: .9rem;
    font-weight: 700;
    color: var(--accent);
    text-decoration: none;
    margin-bottom: 8px;
  }
  .gh-name::before { content: "📁 "; }
  .gh-name:hover { text-decoration: underline; }
  .gh-list { list-style: none; }
  .gh-commit {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: .85rem;
  }
  .gh-commit:last-child { border-bottom: none; }
  .gh-sha {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: .76rem;
    color: var(--accent);
    text-decoration: none;
    flex-shrink: 0;
  }
  .gh-sha:hover { text-decoration: underline; }
  .gh-msg { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gh-when { color: var(--muted); font-size: .76rem; flex-shrink: 0; }
  .gh-err { color: var(--muted); font-size: .82rem; font-style: italic; }

  /* ---- Clocks ---- */
  .clocks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .clock {
    background: var(--panel-2);
    border-radius: 8px;
    padding: 12px 14px;
    border-left: 3px solid var(--grey);
  }
  .clock.working { border-left-color: var(--green); }
  .clock.off { border-left-color: var(--orange); }
  .clock.sleeping { border-left-color: var(--grey); }
  .clock .city { font-size: .82rem; color: var(--muted); }
  .clock .time { font-size: 1.5rem; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
  .clock .cdate { font-size: .74rem; color: var(--muted); }
  .clock .status {
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-top: 4px;
    font-weight: 600;
  }
  .clock.working .status { color: var(--green); }
  .clock.off .status { color: var(--orange); }
  .clock.sleeping .status { color: var(--grey); }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: .8rem;
    margin-top: 28px;
    padding-top: 16px;
  }

  @media (max-width: 760px) {
    body { padding: 18px; }
    .grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
  <header>
    <h1 id="greeting">Good morning</h1>
    <div class="date" id="today"></div>
  </header>

  <div class="grid">
    <section class="panel">
      <h2>🌴 <span>Welcome to the Florida Keys!<br>Here is the weather in Marathon</span></h2>
      <div id="weather"><div class="loading">Loading weather…</div></div>
    </section>

    <section class="panel">
      <h2>🏖️ Countdown to the Weekend</h2>
      <div id="countdown" class="countdown"></div>
    </section>

    <section class="panel">
      <h2>🐙 GitHub Commit Activity</h2>
      <div id="github"><div class="loading">Loading commits…</div></div>
    </section>

    <section class="panel">
      <h2>🕐 Team World Clocks</h2>
      <div class="clocks" id="clocks"></div>
    </section>
  </div>

  <footer>
    Last updated: <span id="last-updated">—</span> · Auto-refreshes every 10 minutes
  </footer>

<script>
"use strict";

/* ===================== Helpers ===================== */
// Converts a wind-direction bearing (degrees, the direction the wind comes FROM)
// into a 16-point compass label plus an arrow pointing the way the wind blows TO.
function compass(deg) {
  const pts = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  const arrows = ["↓","↓","↙","↙","←","←","↖","↖","↑","↑","↗","↗","→","→","↘","↘"];
  const i = Math.round(deg / 22.5) % 16;
  return [pts[i], arrows[i]];
}
// WHO UV index bands → [label, colour].
function uvLevel(uv) {
  if (uv < 3)  return ["Low", "#2a9d8f"];
  if (uv < 6)  return ["Moderate", "#e9c46a"];
  if (uv < 8)  return ["High", "#f4a261"];
  if (uv < 11) return ["Very High", "#e76f51"];
  return ["Extreme", "#9d4edd"];
}

/* ===================== WMO weather codes ===================== */
// Maps Open-Meteo WMO codes to [emoji, description].
function wmo(code) {
  const map = {
    0:  ["☀️", "Clear sky"],
    1:  ["🌤️", "Mainly clear"],
    2:  ["⛅", "Partly cloudy"],
    3:  ["☁️", "Overcast"],
    45: ["🌫️", "Fog"],
    48: ["🌫️", "Rime fog"],
    51: ["🌦️", "Light drizzle"],
    53: ["🌦️", "Drizzle"],
    55: ["🌧️", "Dense drizzle"],
    56: ["🌧️", "Freezing drizzle"],
    57: ["🌧️", "Freezing drizzle"],
    61: ["🌦️", "Light rain"],
    63: ["🌧️", "Rain"],
    65: ["🌧️", "Heavy rain"],
    66: ["🌧️", "Freezing rain"],
    67: ["🌧️", "Freezing rain"],
    71: ["🌨️", "Light snow"],
    73: ["🌨️", "Snow"],
    75: ["❄️", "Heavy snow"],
    77: ["🌨️", "Snow grains"],
    80: ["🌦️", "Light showers"],
    81: ["🌧️", "Showers"],
    82: ["⛈️", "Violent showers"],
    85: ["🌨️", "Snow showers"],
    86: ["❄️", "Heavy snow showers"],
    95: ["⛈️", "Thunderstorm"],
    96: ["⛈️", "Thunderstorm w/ hail"],
    99: ["⛈️", "Thunderstorm w/ hail"]
  };
  return map[code] || ["🌡️", "Unknown"];
}

/* ===================== Weather panel ===================== */
const WEATHER_URL = "https://api.open-meteo.com/v1/forecast?latitude=24.7136&longitude=-81.0905&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,wind_speed_10m_max,wind_direction_10m_dominant,uv_index_max&timezone=auto&forecast_days=5&temperature_unit=fahrenheit&wind_speed_unit=mph";

async function loadWeather() {
  const root = document.getElementById("weather");
  try {
    const res = await fetch(WEATHER_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const d = await res.json();
    const c = d.current;
    const [icon, cond] = wmo(c.weather_code);

    let forecast = "";
    // daily[0] is today; show the next 4 days.
    for (let i = 1; i <= 4 && i < d.daily.time.length; i++) {
      const date = new Date(d.daily.time[i] + "T12:00:00");
      const day = date.toLocaleDateString("en-US", { weekday: "short" });
      const [di] = wmo(d.daily.weather_code[i]);
      const hi = Math.round(d.daily.temperature_2m_max[i]);
      const lo = Math.round(d.daily.temperature_2m_min[i]);
      const wind = Math.round(d.daily.wind_speed_10m_max[i]);
      const [dir, arrow] = compass(d.daily.wind_direction_10m_dominant[i]);
      const uv = Math.round(d.daily.uv_index_max[i]);
      forecast += `<div class="wx-day">
        <div class="d">${day}</div>
        <div class="i">${di}</div>
        <div class="t"><span class="hi">${hi}°</span> <span class="lo">${lo}°</span></div>
        <div class="w">${arrow} ${wind} mph ${dir}</div>
        <div class="w">☀️ UV <span style="color:${uvLevel(uv)[1]}">${uv}</span></div>
      </div>`;
    }

    root.innerHTML = `
      <div class="wx-current">
        <div class="wx-icon">${icon}</div>
        <div>
          <div class="wx-temp">${Math.round(c.temperature_2m)}°F</div>
          <div class="wx-cond">${cond}</div>
          <div class="wx-meta">💧 ${c.relative_humidity_2m}%  ·  💨 ${Math.round(c.wind_speed_10m)} mph  ·  ☀️ UV ${Math.round(c.uv_index)} <span style="color:${uvLevel(c.uv_index)[1]}">${uvLevel(c.uv_index)[0]}</span></div>
        </div>
      </div>
      <div class="wx-forecast">${forecast}</div>`;
  } catch (e) {
    root.innerHTML = `<div class="error">Couldn't load weather (${e.message})</div>`;
  }
}

/* ===================== Weekend countdown panel ===================== */
const MARATHON_TZ = "America/New_York";

// Current wall-clock time in Marathon, returned as a Date whose local fields
// (getDay/getHours/…) read as the Eastern values regardless of the viewer's zone.
function marathonNow() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: MARATHON_TZ }));
}

function tickCountdown() {
  const root = document.getElementById("countdown");
  const now = marathonNow();
  const day = now.getDay();   // 0 Sun … 5 Fri … 6 Sat

  // Next Friday 5:00 PM Eastern.
  const target = new Date(now);
  target.setDate(now.getDate() + ((5 - day + 7) % 7));
  target.setHours(17, 0, 0, 0);
  if (target <= now) target.setDate(target.getDate() + 7); // already past this week's

  // It's the weekend once Friday 5 PM passes, through end of Sunday.
  const isWeekend = (day === 5 && now.getHours() >= 17) || day === 6 || day === 0;
  if (isWeekend) {
    root.innerHTML = `<div class="cd-weekend">🎉 It's the weekend!<br>Enjoy the Keys 🏝️</div>`;
    return;
  }

  let diff = Math.max(0, target - now);
  const days = Math.floor(diff / 86400000); diff -= days * 86400000;
  const hours = Math.floor(diff / 3600000); diff -= hours * 3600000;
  const mins = Math.floor(diff / 60000);    diff -= mins * 60000;
  const secs = Math.floor(diff / 1000);

  const unit = (n, label) =>
    `<div class="cd-unit"><div class="cd-num">${String(n).padStart(2, "0")}</div><div class="cd-label">${label}</div></div>`;

  root.innerHTML = `
    <div class="cd-units">
      ${unit(days, "Days")}
      ${unit(hours, "Hours")}
      ${unit(mins, "Mins")}
      ${unit(secs, "Secs")}
    </div>
    <div class="cd-sub">until 5:00 PM Friday · Marathon time</div>`;
}

/* ===================== GitHub commit activity panel ===================== */
const GH_REPOS = ["DanielChesla/Claude-Lab", "DanielChesla/network-monitor", "DanielChesla/daniel_website"];
const GH_PER_REPO = 4; // commits to show per repo

function ago(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return s + "s ago";
  const m = Math.floor(s / 60);
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  return Math.floor(h / 24) + "d ago";
}
function esc(s) {
  return s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

async function loadGitHub() {
  const root = document.getElementById("github");
  try {
    const groups = await Promise.all(GH_REPOS.map(async repo => {
      try {
        const res = await fetch(`https://api.github.com/repos/${repo}/commits?per_page=${GH_PER_REPO}`,
          { headers: { Accept: "application/vnd.github+json" } });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return { repo, commits: await res.json() };
      } catch (e) {
        return { repo, error: e.message };
      }
    }));

    root.innerHTML = groups.map(g => {
      const name = g.repo.split("/")[1];
      const repoUrl = `https://github.com/${g.repo}`;
      if (g.error) {
        return `<div class="gh-repo">
          <a class="gh-name" href="${repoUrl}" target="_blank" rel="noopener">${name}</a>
          <div class="gh-err">couldn't load (${g.error})</div>
        </div>`;
      }
      const items = g.commits.map(c => {
        const msg = esc((c.commit.message || "").split("\n")[0]);
        return `<li class="gh-commit">
          <a class="gh-sha" href="${c.html_url}" target="_blank" rel="noopener">${c.sha.slice(0, 7)}</a>
          <span class="gh-msg">${msg}</span>
          <span class="gh-when">${ago(c.commit.author.date)}</span>
        </li>`;
      }).join("");
      return `<div class="gh-repo">
        <a class="gh-name" href="${repoUrl}" target="_blank" rel="noopener">${name}</a>
        <ul class="gh-list">${items}</ul>
      </div>`;
    }).join("");
  } catch (e) {
    root.innerHTML = `<div class="error">Couldn't load GitHub activity (${e.message})</div>`;
  }
}

/* ===================== World clocks panel ===================== */
const CITIES = [
  ["London", "Europe/London"],
  ["New York", "America/New_York"],
  ["Singapore", "Asia/Singapore"],
  ["Sydney", "Australia/Sydney"]
];

function statusFor(hour) {
  if (hour >= 9 && hour < 18) return ["working", "Working"];
  if ((hour >= 7 && hour < 9) || (hour >= 18 && hour < 22)) return ["off", "Off hours"];
  return ["sleeping", "Sleeping"];
}

function tickClocks() {
  const root = document.getElementById("clocks");
  const now = new Date();
  const html = CITIES.map(([city, tz]) => {
    const time = now.toLocaleTimeString("en-GB", { timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit" });
    const date = now.toLocaleDateString("en-US", { timeZone: tz, weekday: "short", month: "short", day: "numeric" });
    const hour = parseInt(now.toLocaleString("en-GB", { timeZone: tz, hour: "2-digit", hour12: false }), 10);
    const [cls, label] = statusFor(hour);
    return `<div class="clock ${cls}">
      <div class="city">${city}</div>
      <div class="time">${time}</div>
      <div class="cdate">${date}</div>
      <div class="status">${label}</div>
    </div>`;
  }).join("");
  root.innerHTML = html;
}

/* ===================== Orchestration ===================== */
function setHeader() {
  const now = new Date();
  const h = now.getHours();
  const greeting = h < 12 ? "Good morning" : h < 18 ? "Good afternoon" : "Good evening";
  document.getElementById("greeting").textContent = greeting;
  document.getElementById("today").textContent =
    now.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
}

function refreshData() {
  loadWeather();
  loadGitHub();
  document.getElementById("last-updated").textContent =
    new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
}

function tick() {
  tickClocks();
  tickCountdown();
}

setHeader();
refreshData();
tick();
setInterval(tick, 1000);
setInterval(refreshData, 10 * 60 * 1000);
setInterval(setHeader, 60 * 1000); // keep the date correct past midnight
</script>
</body>
</html>
